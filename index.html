<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Minima Bay: Minima DeFi dapps</title>
    <meta name="description" content="Minima Bay is a collection of non-custodial DeFi protocol MiniDAPPs for the Minima blockchain.">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
    <style>
      /* Bay scene — tropical open ocean, golden sun, cliff islands */
      .scene {
        background: linear-gradient(180deg,
          rgba(55,155,195,0.97) 0%,
          rgba(0,165,178,0.97) 38%,
          rgba(0,138,160,0.97) 58%,
          rgba(0,92,125,0.99) 100%
        );
      }

      .horizon {
        height: 52vh;
        background:
          /* Sun burst — upper right */
          radial-gradient(ellipse at 66% 26%, rgba(255,248,185,0.98) 0% 2.5%, rgba(255,222,75,0.82) 2.5% 7%, rgba(255,168,28,0.52) 7% 16%, rgba(255,125,0,0.22) 16% 28%, transparent 32%),
          /* Left island group */
          radial-gradient(ellipse at 0% 100%, rgba(10,46,20,0.99) 0% 30%, transparent 32%),
          radial-gradient(ellipse at 14% 100%, rgba(16,58,26,0.95) 0% 22%, transparent 26%),
          radial-gradient(ellipse at 7% 96%, rgba(12,50,22,0.88) 0% 16%, transparent 20%),
          /* Right island */
          radial-gradient(ellipse at 98% 100%, rgba(12,48,22,0.97) 0% 26%, transparent 30%),
          radial-gradient(ellipse at 87% 96%, rgba(18,58,28,0.82) 0% 14%, transparent 19%),
          /* Sky — blue at top, golden glow at horizon */
          linear-gradient(180deg,
            rgba(55,150,195,0.92) 0%,
            rgba(110,205,218,0.72) 32%,
            rgba(195,235,195,0.62) 50%,
            rgba(255,228,125,0.92) 60%,
            rgba(255,162,42,0.95) 67%,
            rgba(0,148,162,0.97) 78%
          );
      }

      .horizon::before {
        background: none;
        opacity: 0;
      }

      .water {
        inset: 48vh 0 0;
        background:
          /* Sun reflection on water surface */
          radial-gradient(ellipse at 64% 4%, rgba(255,245,175,0.52) 0% 2%, rgba(255,218,72,0.28) 2% 9%, transparent 16%),
          /* Scatter highlights */
          radial-gradient(ellipse at 28% 18%, rgba(255,255,255,0.32) 0 1.2%, transparent 9%),
          radial-gradient(ellipse at 75% 44%, rgba(255,255,255,0.22) 0 1%, transparent 7%),
          /* Wave lines — slightly more dynamic than pool */
          repeating-linear-gradient(171deg, rgba(255,255,255,0.17) 0 1px, transparent 1px 16px),
          repeating-linear-gradient(19deg, rgba(255,255,255,0.11) 0 1px, transparent 1px 22px),
          /* Water — vivid tropical teal */
          linear-gradient(180deg,
            rgba(0,198,188,0.94) 0%,
            rgba(0,172,178,0.96) 28%,
            rgba(0,138,162,0.97) 58%,
            rgba(0,88,128,0.99) 100%
          );
      }

      .topline .project-links { grid-column: 3; }

      .water::after {
        background:
          radial-gradient(ellipse at 64% 7%, rgba(255,232,145,0.38), transparent 30%),
          linear-gradient(180deg, transparent 58%, rgba(0,28,58,0.32));
        mix-blend-mode: screen;
      }
    </style>
  </head>
  <body>

    <div class="scene" aria-hidden="true">
      <div class="horizon"></div>
      <div class="water"></div>
    </div>

    <main class="app">

      <header class="topline">
        <div class="brand">
          <span class="logo" aria-hidden="true">
            <svg viewBox="0 0 64 64" focusable="false">
              <path d="M10 24c7 4 11 4 18 0s11-4 18 0" />
              <path d="M10 35c7 4 11 4 18 0s11-4 18 0" />
              <path class="wave" d="M10 46c7 3 11 3 18 0s11-3 18 0" />
            </svg>
          </span>
          <div>
            <h1>Minima Bay</h1>
            <p>Minima defi dapps</p>
          </div>
        </div>
        <nav class="project-links" aria-label="Project links">
          <a href="https://github.com/minima-bay" target="_blank" rel="noreferrer" aria-label="GitHub organisation">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M12 .5a12 12 0 0 0-3.79 23.39c.6.11.82-.26.82-.58v-2.04c-3.34.73-4.04-1.42-4.04-1.42-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.74.08-.74 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49.99.11-.78.42-1.3.76-1.6-2.67-.31-5.47-1.34-5.47-5.95 0-1.31.47-2.39 1.24-3.23-.13-.3-.54-1.53.12-3.19 0 0 1.01-.32 3.3 1.23a11.4 11.4 0 0 1 6.02 0c2.29-1.55 3.29-1.23 3.29-1.23.66 1.66.25 2.89.12 3.19.77.84 1.23 1.92 1.23 3.23 0 4.62-2.81 5.63-5.49 5.93.43.37.82 1.1.82 2.22v3.29c0 .32.22.7.83.58A12 12 0 0 0 12 .5z"/>
            </svg>
          </a>
        </nav>
      </header>

      <div class="protocol-grid">

        <a class="protocol-card protocol-card-link" href="pool/">
          <div class="protocol-info">
            <span class="protocol-icon" aria-hidden="true">
              <svg viewBox="0 0 64 64" focusable="false">
                <path d="M16 20h32" />
                <path d="M22 20v28" />
                <path d="M42 20v28" />
                <path d="M22 30h20" />
                <path d="M22 40h20" />
                <path class="wave" d="M10 51c5 3 9 3 14 0s9-3 14 0 10 3 16 0" />
              </svg>
            </span>
            <div class="protocol-text">
              <h3>The Pool</h3>
              <p>MINIMA / USDT liquidity pool</p>
            </div>
          </div>
        </a>

        <article class="protocol-card is-coming">
          <div class="protocol-info">
            <span class="protocol-icon land-icon" aria-hidden="true">
              <svg viewBox="0 0 64 64" focusable="false">
                <path d="M8 46 L22 28 L32 36 L44 18 L56 46" />
                <path d="M8 52 H56" />
              </svg>
            </span>
            <div class="protocol-text">
              <h3>The Land</h3>
              <p>Lending protocol</p>
            </div>
          </div>
          <div class="protocol-actions">
            <span class="coming-badge">Coming soon</span>
          </div>
        </article>

        <article class="protocol-card is-coming">
          <div class="protocol-info">
            <span class="protocol-icon spring-icon" aria-hidden="true">
              <svg viewBox="0 0 64 64" focusable="false">
                <path d="M14 50 H50" />
                <path d="M14 50 L42 50 L42 38" />
                <path d="M32 28 L42 38 L52 28" />
                <path d="M42 38 L42 16" />
              </svg>
            </span>
            <div class="protocol-text">
              <h3>The Springboard</h3>
              <p>Perpetual DEX</p>
            </div>
          </div>
          <div class="protocol-actions">
            <span class="coming-badge">Coming soon</span>
          </div>
        </article>

      </div>

    </main>

  </body>
</html>
